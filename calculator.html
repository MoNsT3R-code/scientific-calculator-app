<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathHub Pro - Calculator, Notes & Graphs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
    <div id="app" class="min-h-screen">
        <!-- Header -->
        <header class="bg-gradient-to-r from-slate-900 to-slate-800 border-b border-slate-700 shadow-lg">
            <div class="max-w-7xl mx-auto px-6 py-6">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    🧮 MathHub Pro
                </h1>
                <p class="text-slate-400 mt-2">Scientific Calculator • Rich Notes • Dynamic Graphs</p>
            </div>
        </header>

        <!-- Main Container -->
        <main class="max-w-7xl mx-auto px-6 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Column 1: Scientific Calculator -->
                <section class="card-section">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="calculator" class="w-6 h-6 text-cyan-400"></i>
                        <h2 class="text-2xl font-bold">Calculator</h2>
                    </div>

                    <div class="space-y-4">
                        <!-- Display Screen -->
                        <div class="bg-slate-900 border-2 border-cyan-500 rounded-lg p-4 shadow-inner">
                            <div class="text-right text-sm text-slate-400 mb-2 h-6" id="prevInput">0</div>
                            <div class="text-right text-4xl font-mono font-bold text-cyan-300 break-words" id="display">0</div>
                        </div>

                        <!-- Calculator Grid -->
                        <div class="grid grid-cols-4 gap-2">
                            <!-- Row 1: Functions -->
                            <button class="calc-btn calc-func" data-action="clear">C</button>
                            <button class="calc-btn calc-func" data-action="backspace">
                                <i data-lucide="delete" class="w-4 h-4"></i>
                            </button>
                            <button class="calc-btn calc-func" data-action="percent">%</button>
                            <button class="calc-btn calc-operator" data-operator="/">÷</button>

                            <!-- Row 2 -->
                            <button class="calc-btn" data-value="7">7</button>
                            <button class="calc-btn" data-value="8">8</button>
                            <button class="calc-btn" data-value="9">9</button>
                            <button class="calc-btn calc-operator" data-operator="*">×</button>

                            <!-- Row 3 -->
                            <button class="calc-btn" data-value="4">4</button>
                            <button class="calc-btn" data-value="5">5</button>
                            <button class="calc-btn" data-value="6">6</button>
                            <button class="calc-btn calc-operator" data-operator="-">−</button>

                            <!-- Row 4 -->
                            <button class="calc-btn" data-value="1">1</button>
                            <button class="calc-btn" data-value="2">2</button>
                            <button class="calc-btn" data-value="3">3</button>
                            <button class="calc-btn calc-operator" data-operator="+">+</button>

                            <!-- Row 5 -->
                            <button class="calc-btn col-span-2" data-value="0">0</button>
                            <button class="calc-btn" data-value=".">.</button>
                            <button class="calc-btn calc-equals" data-action="equals">=</button>

                            <!-- Row 6: Advanced -->
                            <button class="calc-btn calc-sci" data-action="sin">sin</button>
                            <button class="calc-btn calc-sci" data-action="cos">cos</button>
                            <button class="calc-btn calc-sci" data-action="tan">tan</button>
                            <button class="calc-btn calc-sci" data-action="sqrt">√</button>

                            <!-- Row 7: More Advanced -->
                            <button class="calc-btn calc-sci" data-action="log">log</button>
                            <button class="calc-btn calc-sci" data-action="ln">ln</button>
                            <button class="calc-btn calc-sci" data-action="pow">x^y</button>
                            <button class="calc-btn calc-sci" data-action="pi">π</button>

                            <!-- Row 8: Parentheses & e -->
                            <button class="calc-btn calc-sci" data-value="(">(</button>
                            <button class="calc-btn calc-sci" data-value=")">)</button>
                            <button class="calc-btn calc-sci col-span-2" data-action="e">e</button>
                        </div>
                    </div>
                </section>

                <!-- Column 2: Note Taking -->
                <section class="card-section">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="notepad-text" class="w-6 h-6 text-emerald-400"></i>
                        <h2 class="text-2xl font-bold">Notes</h2>
                    </div>

                    <div class="space-y-4">
                        <!-- Toolbar -->
                        <div class="flex flex-wrap gap-2 p-3 bg-slate-800 rounded-lg border border-slate-700">
                            <button id="boldBtn" class="format-btn" title="Bold">
                                <i data-lucide="bold" class="w-4 h-4"></i>
                            </button>
                            <button id="italicBtn" class="format-btn" title="Italic">
                                <i data-lucide="italic" class="w-4 h-4"></i>
                            </button>
                            <div class="w-px bg-slate-600"></div>
                            <button id="bulletBtn" class="format-btn" title="Bullet List">
                                <i data-lucide="list" class="w-4 h-4"></i>
                            </button>
                            <button id="numberBtn" class="format-btn" title="Numbered List">
                                <i data-lucide="list-ordered" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <!-- Text Area -->
                        <textarea 
                            id="noteArea" 
                            class="w-full h-64 bg-slate-800 border-2 border-slate-700 rounded-lg p-4 text-slate-100 font-mono text-sm focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-400/20 resize-none"
                            placeholder="Write your notes, derivations, and thoughts here...">
                        </textarea>

                        <!-- Note Count -->
                        <div class="text-sm text-slate-400">
                            <span id="charCount">0</span> characters
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-3">
                            <button id="saveNote" class="flex-1 btn-primary">
                                <i data-lucide="save" class="w-4 h-4"></i>
                                Save Note
                            </button>
                            <button id="clearNote" class="flex-1 btn-secondary">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                Clear
                            </button>
                        </div>

                        <!-- Save Status -->
                        <div id="saveStatus" class="text-sm text-emerald-400 text-center hidden">✓ Note saved to localStorage</div>
                    </div>
                </section>

                <!-- Column 3: Graph Plotter -->
                <section class="card-section">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="chart-line" class="w-6 h-6 text-purple-400"></i>
                        <h2 class="text-2xl font-bold">Graph Plotter</h2>
                    </div>

                    <div class="space-y-4">
                        <!-- Function Input -->
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">
                                Enter function (e.g., x*x, Math.sin(x), 2*x + 5)
                            </label>
                            <input 
                                type="text" 
                                id="funcInput" 
                                class="w-full bg-slate-800 border-2 border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:border-purple-400 focus:outline-none focus:ring-2 focus:ring-purple-400/20"
                                placeholder="e.g., x*x"
                            >
                        </div>

                        <!-- Color Picker for Functions -->
                        <div class="flex gap-3">
                            <input 
                                type="color" 
                                id="funcColor" 
                                value="#06b6d4" 
                                class="w-12 h-10 rounded cursor-pointer border-2 border-slate-700"
                            >
                            <button id="plotBtn" class="flex-1 btn-primary">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                Add Function
                            </button>
                        </div>

                        <!-- Active Functions List -->
                        <div id="funcList" class="space-y-2">
                            <p class="text-sm text-slate-400 text-center">No functions added</p>
                        </div>

                        <!-- Graph Canvas -->
                        <div class="bg-slate-900 border-2 border-slate-700 rounded-lg overflow-hidden">
                            <canvas id="graphCanvas" class="w-full" height="300"></canvas>
                        </div>

                        <!-- Graph Options -->
                        <div class="space-y-2">
                            <label class="block">
                                <input type="checkbox" id="gridToggle" checked class="mr-2">
                                <span class="text-sm text-slate-300">Show Grid</span>
                            </label>
                            <label class="block">
                                <input type="checkbox" id="axisToggle" checked class="mr-2">
                                <span class="text-sm text-slate-300">Show Axes</span>
                            </label>
                        </div>

                        <!-- Control Buttons -->
                        <div class="flex gap-3">
                            <button id="zoomInBtn" class="flex-1 btn-secondary">
                                <i data-lucide="zoom-in" class="w-4 h-4"></i>
                                Zoom In
                            </button>
                            <button id="zoomOutBtn" class="flex-1 btn-secondary">
                                <i data-lucide="zoom-out" class="w-4 h-4"></i>
                                Zoom Out
                            </button>
                            <button id="clearGraphs" class="flex-1 btn-secondary">
                                <i data-lucide="x" class="w-4 h-4"></i>
                                Clear
                            </button>
                        </div>
                    </div>
                </section>

            </div>
        </main>

        <!-- Footer -->
        <footer class="border-t border-slate-700 mt-16 py-8">
            <div class="max-w-7xl mx-auto px-6 text-center text-slate-400 text-sm">
                <p>MathHub Pro © 2026 | Built with HTML, CSS, JavaScript & Tailwind</p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
